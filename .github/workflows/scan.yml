name: scan

# Free scheduler for the Sentinel scanner (handoff §11).
# Wakes every 5 minutes, runs the scan, writes signals to the DB and pushes
# Telegram alerts. GitHub's minimum cron interval is 5 minutes.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/demo_scan.py
